<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1000" height="1000">
  <style>
    #light-icon { display: inline; }
    #dark-icon { display: none; }
    @media (prefers-color-scheme: dark) {
      #light-icon { display: none; }
      #dark-icon { display: inline; }
    }
  </style>
  
  <g id="light-icon">
    <rect width="1000" height="1000" fill="#0a365f" rx="350" ry="350"/>
    <text x="500" y="650" font-family="Arial, sans-serif" font-size="600" font-weight="bold" fill="white" text-anchor="middle">I</text>
    <path d="M300 700 L700 700" stroke="white" stroke-width="40" />
    <path d="M300 300 L700 300" stroke="white" stroke-width="40" />
  </g>
  
  <g id="dark-icon">
    <rect width="1000" height="1000" fill="#0a365f" rx="350" ry="350"/>
    <text x="500" y="650" font-family="Arial, sans-serif" font-size="600" font-weight="bold" fill="white" text-anchor="middle">I</text>
    <path d="M300 700 L700 700" stroke="white" stroke-width="40" />
    <path d="M300 300 L700 300" stroke="white" stroke-width="40" />
  </g>
</svg>