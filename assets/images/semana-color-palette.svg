<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'Arial', sans-serif;
      fill: #212121;
    }
    .title {
      font-size: 24px;
      font-weight: bold;
    }
    .category {
      font-size: 18px;
      font-weight: bold;
    }
    .color-name {
      font-size: 14px;
    }
    .color-hex {
      font-size: 12px;
      fill: #757575;
    }
    .swatch {
      stroke-width: 1;
      stroke: #E0E0E0;
    }
    .white-text {
      fill: white;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="600" fill="#F5F5F5"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="title">Semana.com Redesign Color Palette</text>
  
  <!-- Primary Brand Colors Section -->
  <text x="50" y="80" class="category">Primary Brand Colors</text>
  
  <!-- Primary Red -->
  <rect x="50" y="90" width="120" height="80" rx="4" class="swatch" fill="#E3000B"/>
  <text x="110" y="190" text-anchor="middle" class="color-name">Primary Red</text>
  <text x="110" y="210" text-anchor="middle" class="color-hex">#E3000B</text>
  
  <!-- Dark Red -->
  <rect x="190" y="90" width="120" height="80" rx="4" class="swatch" fill="#B10008"/>
  <text x="250" y="190" text-anchor="middle" class="color-name">Dark Red</text>
  <text x="250" y="210" text-anchor="middle" class="color-hex">#B10008</text>
  
  <!-- Light Red -->
  <rect x="330" y="90" width="120" height="80" rx="4" class="swatch" fill="#FF4D55"/>
  <text x="390" y="190" text-anchor="middle" class="color-name">Light Red</text>
  <text x="390" y="210" text-anchor="middle" class="color-hex">#FF4D55</text>
  
  <!-- Section Color Coding -->
  <text x="50" y="250" class="category">Section Color Coding</text>
  
  <!-- Politics Blue -->
  <rect x="50" y="260" width="120" height="80" rx="4" class="swatch" fill="#4A6FE3"/>
  <text x="110" y="360" text-anchor="middle" class="color-name white-text">Politics</text>
  <text x="110" y="380" text-anchor="middle" class="color-hex white-text">#4A6FE3</text>
  
  <!-- Economy Green -->
  <rect x="190" y="260" width="120" height="80" rx="4" class="swatch" fill="#2D9D78"/>
  <text x="250" y="360" text-anchor="middle" class="color-name white-text">Economy</text>
  <text x="250" y="380" text-anchor="middle" class="color-hex white-text">#2D9D78</text>
  
  <!-- Nation Purple -->
  <rect x="330" y="260" width="120" height="80" rx="4" class="swatch" fill="#9C27B0"/>
  <text x="390" y="360" text-anchor="middle" class="color-name white-text">Nation</text>
  <text x="390" y="380" text-anchor="middle" class="color-hex white-text">#9C27B0</text>
  
  <!-- World Orange -->
  <rect x="470" y="260" width="120" height="80" rx="4" class="swatch" fill="#FF9800"/>
  <text x="530" y="360" text-anchor="middle" class="color-name">World</text>
  <text x="530" y="380" text-anchor="middle" class="color-hex">#FF9800</text>
  
  <!-- Opinion Brown -->
  <rect x="610" y="260" width="120" height="80" rx="4" class="swatch" fill="#795548"/>
  <text x="670" y="360" text-anchor="middle" class="color-name white-text">Opinion</text>
  <text x="670" y="380" text-anchor="middle" class="color-hex white-text">#795548</text>
  
  <!-- Sports Light Blue -->
  <rect x="50" y="400" width="120" height="80" rx="4" class="swatch" fill="#03A9F4"/>
  <text x="110" y="500" text-anchor="middle" class="color-name white-text">Sports</text>
  <text x="110" y="520" text-anchor="middle" class="color-hex white-text">#03A9F4</text>
  
  <!-- Neutrals -->
  <text x="400" y="250" class="category">Neutrals</text>
  
  <!-- Dark Gray -->
  <rect x="190" y="400" width="120" height="80" rx="4" class="swatch" fill="#212121"/>
  <text x="250" y="500" text-anchor="middle" class="color-name white-text">Dark Gray</text>
  <text x="250" y="520" text-anchor="middle" class="color-hex white-text">#212121</text>
  
  <!-- Medium Gray -->
  <rect x="330" y="400" width="120" height="80" rx="4" class="swatch" fill="#757575"/>
  <text x="390" y="500" text-anchor="middle" class="color-name white-text">Medium Gray</text>
  <text x="390" y="520" text-anchor="middle" class="color-hex white-text">#757575</text>
  
  <!-- Light Gray -->
  <rect x="470" y="400" width="120" height="80" rx="4" class="swatch" fill="#E0E0E0"/>
  <text x="530" y="500" text-anchor="middle" class="color-name">Light Gray</text>
  <text x="530" y="520" text-anchor="middle" class="color-hex">#E0E0E0</text>
  
  <!-- Off White -->
  <rect x="610" y="400" width="120" height="80" rx="4" class="swatch" fill="#F5F5F5" stroke="#E0E0E0"/>
  <text x="670" y="500" text-anchor="middle" class="color-name">Off White</text>
  <text x="670" y="520" text-anchor="middle" class="color-hex">#F5F5F5</text>
  
  <!-- UI Accents -->
  <text x="500" y="80" class="category">UI Accents</text>
  
  <!-- Success Green -->
  <rect x="500" y="90" width="100" height="60" rx="4" class="swatch" fill="#4CAF50"/>
  <text x="550" y="170" text-anchor="middle" class="color-name white-text">Success</text>
  <text x="550" y="190" text-anchor="middle" class="color-hex white-text">#4CAF50</text>
  
  <!-- Warning Yellow -->
  <rect x="620" y="90" width="100" height="60" rx="4" class="swatch" fill="#FFC107"/>
  <text x="670" y="170" text-anchor="middle" class="color-name">Warning</text>
  <text x="670" y="190" text-anchor="middle" class="color-hex">#FFC107</text>
  
  <!-- Error Red -->
  <rect x="500" y="160" width="100" height="60" rx="4" class="swatch" fill="#F44336"/>
  <text x="550" y="240" text-anchor="middle" class="color-name white-text">Error</text>
  <text x="550" y="260" text-anchor="middle" class="color-hex white-text">#F44336</text>
  
  <!-- Info Blue -->
  <rect x="620" y="160" width="100" height="60" rx="4" class="swatch" fill="#2196F3"/>
  <text x="670" y="240" text-anchor="middle" class="color-name white-text">Info</text>
  <text x="670" y="260" text-anchor="middle" class="color-hex white-text">#2196F3</text>
  
  <!-- Footer -->
  <text x="400" y="580" text-anchor="middle" font-size="12">Semana.com Redesign © 2025</text>
</svg>