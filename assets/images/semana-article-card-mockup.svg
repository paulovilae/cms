<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="460" viewBox="0 0 400 460" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700&amp;family=Georgia:wght@400;700&amp;display=swap');
    
    .card {
      filter: drop-shadow(0px 2px 8px rgba(0, 0, 0, 0.1));
    }
    
    .card-title {
      font-family: 'Georgia', serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.3;
    }
    
    .card-text {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
    
    .card-meta {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 12px;
    }
    
    .card-author {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
    
    .card-link {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 14px;
      font-weight: 700;
    }
  </style>

  <!-- Card Background -->
  <rect x="10" y="10" width="380" height="440" rx="8" class="card" fill="white"/>
  
  <!-- Image Container -->
  <rect x="10" y="10" width="380" height="214" rx="8 8 0 0" fill="#E0E0E0"/>
  
  <!-- Example Image (News photo placeholder) -->
  <rect x="10" y="10" width="380" height="214" rx="8 8 0 0" fill="#9C27B0" opacity="0.2"/>
  <path d="M190 80 L220 120 L160 120 Z" fill="#9C27B0" opacity="0.3"/>
  <circle cx="250" cy="70" r="30" fill="#9C27B0" opacity="0.3"/>
  
  <!-- Category Tag -->
  <rect x="26" y="26" width="80" height="24" rx="4" fill="#9C27B0"/>
  <text x="66" y="42" text-anchor="middle" fill="white" class="card-meta" style="text-transform: uppercase; font-weight: 700;">Nation</text>
  
  <!-- Content Area -->
  <g transform="translate(26, 240)">
    <!-- Timestamp -->
    <text class="card-meta" fill="#757575">July 11, 2025 • 5 min read</text>
    
    <!-- Title -->
    <text y="30" class="card-title" fill="#212121">Procurador habla de los rumores de aplazar las elecciones</text>
    <text y="55" class="card-title" fill="#212121">"El calendario electoral no depende de una persona"</text>
    
    <!-- Excerpt -->
    <text y="90" class="card-text" fill="#757575">El alto funcionario se pronunció desde Barranquilla</text>
    <text y="115" class="card-text" fill="#757575">durante un foro del diario 'El Tiempo'. Explicó que</text>
    <text y="140" class="card-text" fill="#757575">el proceso electoral está garantizado por ley.</text>
    
    <!-- Footer -->
    <line x1="0" y1="170" x2="348" y2="170" stroke="#E0E0E0"/>
    
    <!-- Author -->
    <text y="195" class="card-author" fill="#212121">Por: María González</text>
    
    <!-- Read More Link -->
    <text x="348" y="195" text-anchor="end" class="card-link" fill="#E3000B">Leer más</text>
  </g>
  
  <!-- Card Border -->
  <rect x="10" y="10" width="380" height="440" rx="8" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Annotations -->
  <g transform="translate(0, 10)" opacity="0.8">
    <!-- Color category annotation -->
    <line x1="106" y1="38" x2="150" y2="38" stroke="#212121" stroke-dasharray="2"/>
    <text x="155" y="42" font-size="12" fill="#212121">Nation Purple: #9C27B0</text>
    
    <!-- Typography annotation -->
    <line x1="280" y1="295" x2="330" y2="320" stroke="#212121" stroke-dasharray="2"/>
    <text x="335" y="325" font-size="12" fill="#212121">Georgia, 20px, 700 weight</text>
    
    <!-- Spacing annotation -->
    <line x1="395" y1="240" x2="430" y2="240" stroke="#212121" stroke-dasharray="2"/>
    <text x="435" y="244" text-anchor="start" font-size="12" fill="#212121">16px padding</text>
  </g>
  
  <!-- Header "Standard Article Card" -->
  <rect x="10" y="-30" width="380" height="30" rx="4" fill="#E3000B"/>
  <text x="200" y="-10" text-anchor="middle" fill="white" font-weight="bold">Standard Article Card</text>
</svg>