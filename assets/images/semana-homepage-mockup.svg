<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="1200" viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&amp;family=Georgia:wght@400;700&amp;display=swap');
    
    text {
      font-family: 'Source Sans Pro', sans-serif;
    }
    
    .title {
      font-family: 'Georgia', serif;
      font-weight: 700;
    }
    
    .subtitle {
      font-family: 'Source Sans Pro', sans-serif;
      font-weight: 600;
    }
    
    .body-text {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    
    .card {
      filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1));
    }
    
    .meta-text {
      font-size: 12px;
      fill: #757575;
    }
    
    .section-title {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Georgia', serif;
    }
    
    .section-bar {
      height: 4px;
    }
    
    .annotation {
      font-size: 11px;
      fill: #757575;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="1200" fill="#F5F5F5"/>
  
  <!-- Header Title -->
  <rect x="0" y="0" width="900" height="40" fill="#212121"/>
  <text x="450" y="25" text-anchor="middle" font-size="16" fill="white" font-weight="bold">Semana.com Homepage Redesign</text>
  
  <!-- Navigation Bar -->
  <rect x="0" y="40" width="900" height="60" fill="white" stroke="#E0E0E0"/>
  
  <!-- Logo -->
  <rect x="30" y="55" width="120" height="30" fill="#E3000B" rx="2"/>
  <text x="90" y="75" text-anchor="middle" fill="white" font-weight="bold" font-size="16">SEMANA</text>
  
  <!-- Main Navigation -->
  <g transform="translate(180, 55)">
    <!-- Politics -->
    <g transform="translate(0, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Política</text>
      <rect width="80" height="4" y="30" fill="#4A6FE3"/>
    </g>
    
    <!-- Economy -->
    <g transform="translate(90, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Economía</text>
      <rect width="80" height="4" y="30" fill="#2D9D78"/>
    </g>
    
    <!-- Nation -->
    <g transform="translate(180, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Nación</text>
      <rect width="80" height="4" y="30" fill="#9C27B0"/>
    </g>
    
    <!-- World -->
    <g transform="translate(270, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Mundo</text>
      <rect width="80" height="4" y="30" fill="#FF9800"/>
    </g>
    
    <!-- Opinion -->
    <g transform="translate(360, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Opinión</text>
      <rect width="80" height="4" y="30" fill="#795548"/>
    </g>
    
    <!-- Sports -->
    <g transform="translate(450, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" fill="#212121" font-size="14">Deportes</text>
      <rect width="80" height="4" y="30" fill="#03A9F4"/>
    </g>
  </g>
  
  <!-- User Controls -->
  <g transform="translate(750, 55)">
    <circle cx="15" cy="15" r="15" fill="#E0E0E0"/>
    <text x="15" y="20" text-anchor="middle" fill="#757575" font-size="14">🔍</text>
    
    <rect x="40" y="5" width="80" height="24" rx="12" fill="#E3000B"/>
    <text x="80" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SUSCRIBIRSE</text>
  </g>
  
  <!-- Trending Tags -->
  <rect x="0" y="100" width="900" height="40" fill="white" stroke="#E0E0E0"/>
  <text x="30" y="125" fill="#212121" font-size="14" font-weight="bold">Tendencias:</text>
  <g transform="translate(120, 100)">
    <rect width="120" height="40" fill="transparent"/>
    <text x="60" y="25" text-anchor="middle" fill="#E3000B" font-size="14">Pasaportes</text>
  </g>
  <g transform="translate(240, 100)">
    <rect width="120" height="40" fill="transparent"/>
    <text x="60" y="25" text-anchor="middle" fill="#212121" font-size="14">Gustavo Petro</text>
  </g>
  <g transform="translate(360, 100)">
    <rect width="160" height="40" fill="transparent"/>
    <text x="80" y="25" text-anchor="middle" fill="#212121" font-size="14">Tour de Francia 2025</text>
  </g>
  <g transform="translate(520, 100)">
    <rect width="120" height="40" fill="transparent"/>
    <text x="60" y="25" text-anchor="middle" fill="#212121" font-size="14">Loterías</text>
  </g>
  
  <!-- Main Hero Area -->
  <rect x="30" y="160" width="840" height="300" rx="8" fill="white" class="card"/>
  
  <!-- Hero Image -->
  <rect x="30" y="160" width="560" height="300" rx="8 0 0 8" fill="#E0E0E0"/>
  <rect x="30" y="160" width="560" height="300" rx="8 0 0 8" fill="#9C27B0" opacity="0.2"/>
  <rect x="30" y="400" width="560" height="60" fill="rgba(0,0,0,0.7)"/>
  
  <!-- Category Tag -->
  <rect x="50" y="180" width="80" height="24" rx="4" fill="#9C27B0"/>
  <text x="90" y="196" text-anchor="middle" fill="white" font-size="12" font-weight="bold">NACIÓN</text>
  
  <!-- Hero Headline -->
  <text x="50" y="430" class="title" fill="white" font-size="24">Procurador habla de los rumores de aplazar las elecciones</text>
  <text x="50" y="455" class="subtitle" fill="white" font-size="18">"El calendario electoral no depende de una persona"</text>
  
  <!-- Sidebar Articles -->
  <g transform="translate(590, 160)">
    <!-- Sidebar Article 1 -->
    <rect x="0" y="0" width="280" height="95" fill="transparent"/>
    <rect x="0" y="0" width="95" height="95" fill="#E0E0E0"/>
    <rect x="0" y="0" width="95" height="95" fill="#4A6FE3" opacity="0.2"/>
    <rect x="0" y="0" width="40" height="20" rx="4" fill="#4A6FE3"/>
    <text x="20" y="14" text-anchor="middle" fill="white" font-size="10" font-weight="bold">POLÍTICA</text>
    <text x="105" y="20" class="meta-text">Hace 38 minutos</text>
    <text x="105" y="40" class="title" fill="#212121" font-size="14">Demandan ante la Corte Constitucional la prevalencia de la JEP</text>
    <text x="105" y="60" class="body-text" fill="#757575">La justicia ordinaria para investigar a los militares está en debate.</text>
    
    <!-- Sidebar Article 2 -->
    <rect x="0" y="105" width="280" height="95" fill="transparent"/>
    <rect x="0" y="105" width="95" height="95" fill="#E0E0E0"/>
    <rect x="0" y="105" width="95" height="95" fill="#9C27B0" opacity="0.2"/>
    <rect x="0" y="105" width="40" height="20" rx="4" fill="#9C27B0"/>
    <text x="20" y="119" text-anchor="middle" fill="white" font-size="10" font-weight="bold">NACIÓN</text>
    <text x="105" y="125" class="meta-text">Hace 6 minutos</text>
    <text x="105" y="145" class="title" fill="#212121" font-size="14">Líder de 'Los Pepes' envió una carta al presidente Gustavo Petro</text>
    <text x="105" y="165" class="body-text" fill="#757575">Aprovechó para mencionar a Isabel Zuleta.</text>
    
    <!-- Sidebar Article 3 -->
    <rect x="0" y="210" width="280" height="95" fill="transparent"/>
    <rect x="0" y="210" width="95" height="95" fill="#E0E0E0"/>
    <rect x="0" y="210" width="95" height="95" fill="#9C27B0" opacity="0.2"/>
    <rect x="0" y="210" width="40" height="20" rx="4" fill="#9C27B0"/>
    <text x="20" y="224" text-anchor="middle" fill="white" font-size="10" font-weight="bold">NACIÓN</text>
    <text x="105" y="230" class="meta-text">Hace 1 hora</text>
    <text x="105" y="250" class="title" fill="#212121" font-size="14">Cerrada vía Bogotá-Villavicencio tras fuertes lluvias</text>
    <text x="105" y="270" class="body-text" fill="#757575">Hay varias emergencias en la carretera tras las lluvias.</text>
  </g>
  
  <!-- Education Section -->
  <g transform="translate(30, 490)">
    <text class="section-title" fill="#212121">Educación</text>
    <rect x="0" y="30" width="120" height="4" class="section-bar" fill="#2D9D78"/>
    
    <!-- Article Card -->
    <rect x="0" y="50" width="840" height="160" rx="8" fill="white" class="card"/>
    <rect x="0" y="50" width="280" height="160" fill="#E0E0E0"/>
    <rect x="0" y="50" width="280" height="160" fill="#2D9D78" opacity="0.2"/>
    <rect x="15" y="65" width="60" height="20" rx="4" fill="#2D9D78"/>
    <text x="45" y="79" text-anchor="middle" fill="white" font-size="10" font-weight="bold">EDUCACIÓN</text>
    
    <text x="295" y="75" class="meta-text">Hace 2 horas</text>
    <text x="295" y="100" class="title" fill="#212121" font-size="20">Nueva ley para colegios en Colombia: ya no habría dura madrugada y proponen nueva materia</text>
    <text x="295" y="130" class="body-text" fill="#757575" font-size="14">Las normas que cursan en el Legislativo buscan brindar mayor bienestar a los estudiantes y se enfocan en mejorar las condiciones de aprendizaje.</text>
    <text x="295" y="150" class="body-text" fill="#757575" font-size="14">La propuesta también incluye cambios en el calendario académico.</text>
    <text x="295" y="190" class="meta-text" font-weight="bold">Por: María Rodríguez</text>
    <text x="820" y="190" text-anchor="end" fill="#E3000B" font-size="14" font-weight="bold">Leer más</text>
  </g>
  
  <!-- Politics and Economy Grid -->
  <g transform="translate(30, 680)">
    <!-- Two-column grid layout -->
    
    <!-- Politics Column -->
    <g>
      <text class="section-title" fill="#212121">Política</text>
      <rect x="0" y="30" width="120" height="4" class="section-bar" fill="#4A6FE3"/>
      
      <!-- Politics Card 1 -->
      <rect x="0" y="50" width="400" height="120" rx="8" fill="white" class="card"/>
      <rect x="0" y="50" width="120" height="120" fill="#E0E0E0"/>
      <rect x="0" y="50" width="120" height="120" fill="#4A6FE3" opacity="0.2"/>
      <rect x="10" y="60" width="60" height="20" rx="4" fill="#4A6FE3"/>
      <text x="40" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">POLÍTICA</text>
      
      <text x="130" y="70" class="meta-text">Hace 32 minutos</text>
      <text x="130" y="90" class="title" fill="#212121" font-size="16">Procurador habla de los rumores de aplazar las elecciones</text>
      <text x="130" y="110" class="body-text" fill="#757575">El alto funcionario se pronunció desde Barranquilla durante un foro.</text>
      <text x="130" y="130" class="meta-text" font-weight="bold">Por: Juan Pérez</text>
      <text x="380" y="130" text-anchor="end" fill="#4A6FE3" font-size="12" font-weight="bold">Leer más</text>
      
      <!-- Politics Card 2 -->
      <rect x="0" y="180" width="400" height="120" rx="8" fill="white" class="card"/>
      <rect x="0" y="180" width="120" height="120" fill="#E0E0E0"/>
      <rect x="0" y="180" width="120" height="120" fill="#4A6FE3" opacity="0.2"/>
      <rect x="10" y="190" width="60" height="20" rx="4" fill="#4A6FE3"/>
      <text x="40" y="204" text-anchor="middle" fill="white" font-size="10" font-weight="bold">POLÍTICA</text>
      
      <text x="130" y="200" class="meta-text">Hace 43 minutos</text>
      <text x="130" y="220" class="title" fill="#212121" font-size="16">SuperSociedades responde a la Corte Constitucional</text>
      <text x="130" y="240" class="body-text" fill="#757575">"Respetamos y acatamos la decisión", Billy Escobar.</text>
      <text x="130" y="260" class="meta-text" font-weight="bold">Por: Ana Gómez</text>
      <text x="380" y="260" text-anchor="end" fill="#4A6FE3" font-size="12" font-weight="bold">Leer más</text>
    </g>
    
    <!-- Economy Column -->
    <g transform="translate(420, 0)">
      <text class="section-title" fill="#212121">Economía</text>
      <rect x="0" y="30" width="120" height="4" class="section-bar" fill="#2D9D78"/>
      
      <!-- Economy Card 1 -->
      <rect x="0" y="50" width="400" height="120" rx="8" fill="white" class="card"/>
      <rect x="0" y="50" width="120" height="120" fill="#E0E0E0"/>
      <rect x="0" y="50" width="120" height="120" fill="#2D9D78" opacity="0.2"/>
      <rect x="10" y="60" width="60" height="20" rx="4" fill="#2D9D78"/>
      <text x="40" y="74" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ECONOMÍA</text>
      
      <text x="130" y="70" class="meta-text">Hace 35 minutos</text>
      <text x="130" y="90" class="title" fill="#212121" font-size="16">Dólar en casas de cambio para este 11 de julio</text>
      <text x="130" y="110" class="body-text" fill="#757575">La moneda americana se ha movido en un terreno inestable.</text>
      <text x="130" y="130" class="meta-text" font-weight="bold">Por: Carlos Méndez</text>
      <text x="380" y="130" text-anchor="end" fill="#2D9D78" font-size="12" font-weight="bold">Leer más</text>
      
      <!-- Economy Card 2 -->
      <rect x="0" y="180" width="400" height="120" rx="8" fill="white" class="card"/>
      <rect x="0" y="180" width="120" height="120" fill="#E0E0E0"/>
      <rect x="0" y="180" width="120" height="120" fill="#2D9D78" opacity="0.2"/>
      <rect x="10" y="190" width="60" height="20" rx="4" fill="#2D9D78"/>
      <text x="40" y="204" text-anchor="middle" fill="white" font-size="10" font-weight="bold">ECONOMÍA</text>
      
      <text x="130" y="200" class="meta-text">Hace 1 hora</text>
      <text x="130" y="220" class="title" fill="#212121" font-size="16">Empresa de colchones en Estados Unidos anunció su quiebra</text>
      <text x="130" y="240" class="body-text" fill="#757575">La compañía enfrenta dificultades financieras importantes.</text>
      <text x="130" y="260" class="meta-text" font-weight="bold">Por: Laura Martínez</text>
      <text x="380" y="260" text-anchor="end" fill="#2D9D78" font-size="12" font-weight="bold">Leer más</text>
    </g>
  </g>
  
  <!-- Design Annotations -->
  <g transform="translate(30, 1000)" opacity="0.8">
    <text x="0" y="20" class="annotation" font-weight="bold">DESIGN SYSTEM IMPLEMENTATION NOTES:</text>
    
    <text x="0" y="40" class="annotation">1. Consistent section headings with color-coded indicators matching content categories</text>
    <text x="0" y="60" class="annotation">2. Standardized card layouts with proper spacing (16px padding, 24px between cards)</text>
    <text x="0" y="80" class="annotation">3. Clear typography hierarchy: Georgia for headlines, Source Sans Pro for body text</text>
    <text x="0" y="100" class="annotation">4. Color-coded category tags maintain consistent visual language</text>
    <text x="0" y="120" class="annotation">5. Enhanced whitespace improves readability and content focus</text>
    <text x="0" y="140" class="annotation">6. Responsive grid layout adapts to different screen sizes</text>
    
    <line x1="0" y1="160" x2="840" y2="160" stroke="#E0E0E0"/>
    
    <text x="0" y="180" class="annotation" font-weight="bold">ACCESSIBILITY FEATURES:</text>
    <text x="0" y="200" class="annotation">- All text meets WCAG 2.1 AA contrast requirements</text>
    <text x="0" y="220" class="annotation">- Interactive elements have clear hover/focus states</text>
    <text x="0" y="240" class="annotation">- Semantic structure with proper headings hierarchy</text>
  </g>
</svg>