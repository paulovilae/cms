<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&amp;display=swap');
    
    text {
      font-family: 'Source Sans Pro', sans-serif;
    }
    
    .nav-title {
      font-size: 16px;
      font-weight: bold;
    }
    
    .nav-item {
      font-size: 14px;
    }
    
    .nav-active {
      font-weight: 600;
    }
    
    .section-indicator {
      height: 4px;
      position: absolute;
      bottom: 0;
      left: 0;
      border-radius: 2px 2px 0 0;
    }
    
    .dropdown {
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.1));
    }
    
    .annotation {
      font-size: 12px;
      fill: #757575;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="400" fill="#F5F5F5"/>
  
  <!-- Header Title -->
  <text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#212121">Semana.com Navigation Redesign</text>
  
  <!-- Main Navigation Bar -->
  <rect x="50" y="60" width="700" height="60" fill="white" stroke="#E0E0E0"/>
  
  <!-- Logo -->
  <rect x="70" y="75" width="120" height="30" fill="#E3000B" rx="2"/>
  <text x="130" y="95" text-anchor="middle" fill="white" font-weight="bold" font-size="16">SEMANA</text>
  
  <!-- Navigation Items -->
  <g transform="translate(220, 75)">
    <!-- Politics -->
    <g>
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" class="nav-item" fill="#212121">Política</text>
      <rect width="80" height="4" y="30" fill="#4A6FE3" class="section-indicator"/>
    </g>
    
    <!-- Economy -->
    <g transform="translate(90, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" class="nav-item" fill="#212121">Economía</text>
      <rect width="80" height="4" y="30" fill="#2D9D78" class="section-indicator"/>
    </g>
    
    <!-- Nation - Active -->
    <g transform="translate(180, 0)">
      <rect width="80" height="30" fill="#F5F5F5" rx="4"/>
      <text x="40" y="20" text-anchor="middle" class="nav-item nav-active" fill="#212121">Nación</text>
      <rect width="80" height="4" y="30" fill="#9C27B0" class="section-indicator"/>
    </g>
    
    <!-- World -->
    <g transform="translate(270, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" class="nav-item" fill="#212121">Mundo</text>
      <rect width="80" height="4" y="30" fill="#FF9800" class="section-indicator"/>
    </g>
    
    <!-- Opinion -->
    <g transform="translate(360, 0)">
      <rect width="80" height="30" fill="transparent"/>
      <text x="40" y="20" text-anchor="middle" class="nav-item" fill="#212121">Opinión</text>
      <rect width="80" height="4" y="30" fill="#795548" class="section-indicator"/>
    </g>
  </g>
  
  <!-- User Controls -->
  <g transform="translate(650, 75)">
    <circle cx="15" cy="15" r="15" fill="#E0E0E0"/>
    <text x="15" y="20" text-anchor="middle" fill="#757575" font-size="14">🔍</text>
    
    <rect x="40" y="5" width="80" height="24" rx="12" fill="#E3000B"/>
    <text x="80" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">SUSCRIBIRSE</text>
  </g>
  
  <!-- Dropdown Menu -->
  <g transform="translate(400, 140)">
    <rect x="-150" y="0" width="300" height="200" fill="white" class="dropdown" rx="4"/>
    
    <!-- Section header -->
    <rect x="-150" y="0" width="300" height="40" fill="#9C27B0" rx="4 4 0 0"/>
    <text x="0" y="25" text-anchor="middle" fill="white" font-weight="bold" font-size="16">NACIÓN</text>
    
    <!-- Dropdown Items -->
    <line x1="-130" y1="60" x2="130" y2="60" stroke="#E0E0E0"/>
    <text x="-130" y="85" class="nav-item" fill="#212121">Política Nacional</text>
    
    <line x1="-130" y1="100" x2="130" y2="100" stroke="#E0E0E0"/>
    <text x="-130" y="125" class="nav-item nav-active" fill="#9C27B0">Elecciones 2026</text>
    
    <line x1="-130" y1="140" x2="130" y2="140" stroke="#E0E0E0"/>
    <text x="-130" y="165" class="nav-item" fill="#212121">Conflicto Armado</text>
    
    <line x1="-130" y1="180" x2="130" y2="180" stroke="#E0E0E0"/>
    <text x="-130" y="205" class="nav-item" fill="#212121">Justicia</text>
  </g>
  
  <!-- Annotations -->
  <g>
    <!-- Color coding annotation -->
    <line x1="400" y1="94" x2="400" y2="120" stroke="#757575" stroke-dasharray="2"/>
    <text x="400" y="135" text-anchor="middle" class="annotation">Nation Purple: #9C27B0 - Consistent color coding across navigation</text>
    
    <!-- Active state annotation -->
    <line x1="365" y1="75" x2="420" y2="50" stroke="#757575" stroke-dasharray="2"/>
    <text x="430" y="45" text-anchor="start" class="annotation">Active state with background highlight and color accent</text>
    
    <!-- Dropdown annotation -->
    <line x1="250" y1="180" x2="200" y2="180" stroke="#757575" stroke-dasharray="2"/>
    <text x="180" y="180" text-anchor="end" class="annotation">Consistent spacing (16px)</text>
    
    <!-- Mobile annotation -->
    <text x="100" y="370" class="annotation">Note: Mobile navigation would use a hamburger menu with</text>
    <text x="100" y="385" class="annotation">the same color coding system and increased touch targets (44px min)</text>
  </g>
  
  <!-- Mobile Navigation Preview -->
  <g transform="translate(650, 250)">
    <rect width="100" height="100" rx="8" fill="white" stroke="#E0E0E0"/>
    <rect x="25" y="30" width="50" height="8" rx="4" fill="#E0E0E0"/>
    <rect x="25" y="46" width="50" height="8" rx="4" fill="#E0E0E0"/>
    <rect x="25" y="62" width="50" height="8" rx="4" fill="#E0E0E0"/>
    <rect width="100" height="4" y="96" fill="#9C27B0"/>
  </g>
</svg>